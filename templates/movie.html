{% extends "base.html" %}

{% block title %}
{{ movie.title }}
{% endblock %}


{% block content %}

<div class="card shadow p-4">

<h1>
🎬 {{ movie.title }}
</h1>


<img 
src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}"
class="img-fluid"
style="max-width:300px;">


<h4 class="mt-3">
⭐ Rating: {{ movie.vote_average }}
</h4>


<p>
{{ movie.overview }}
</p>


<p>
📅 Release:
{{ movie.release_date }}
</p>


<a href="/" class="btn btn-dark">
⬅ Back
</a>

</div>

{% endblock %}
