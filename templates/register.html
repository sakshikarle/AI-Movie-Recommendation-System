{% extends "base.html" %}

{% block title %}Register{% endblock %}


{% block content %}


<div class="auth-page">


    <div class="auth-box">



        <h2 class="text-center mb-4">
            Create Account
        </h2>




        <form action="/register" method="POST">


            <div class="mb-3">


                <label class="form-label">
                    Username
                </label>


                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>


            </div>





            <div class="mb-3">


                <label class="form-label">
                    Email
                </label>


                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>


            </div>






            <div class="mb-3">


                <label class="form-label">
                    Password
                </label>


                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>


            </div>






            <button
                class="btn btn-success w-100">

                Register

            </button>




        </form>






        <p class="text-center mt-3">


            Already have an account?


            <a href="/login">

                Login

            </a>


        </p>




    </div>


</div>




{% endblock %}
