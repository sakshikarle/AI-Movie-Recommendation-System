{% extends "base.html" %}

{% block title %}Login{% endblock %}


{% block content %}


<div class="auth-page">


    <div class="auth-box">


        <h2 class="text-center mb-4">
            Login
        </h2>



        <form action="/login" method="POST">


            <div class="mb-3">


                <label class="form-label">
                    Username
                </label>


                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>


            </div>



            <div class="mb-3">


                <label class="form-label">
                    Password
                </label>


                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>


            </div>




            <button class="btn btn-primary w-100">

                Login

            </button>



        </form>





        <p class="text-center mt-3">


            Don't have an account?


            <a href="/register">

                Register

            </a>


        </p>



    </div>


</div>



{% endblock %}
